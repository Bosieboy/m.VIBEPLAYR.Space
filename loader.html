<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<title>VIBEPLAYR Space</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: #0a0a0f;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 24px;
    text-align: center;
    padding: 32px;
  }
  .logo {
    font-size: 48px;
    letter-spacing: 4px;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #818cf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .sub { color: #6b7280; font-size: 14px; letter-spacing: 1px; }
  .bar-wrap {
    width: 200px; height: 4px;
    background: #1f1f2e;
    border-radius: 4px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #a78bfa, #818cf8);
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .status { color: #9ca3af; font-size: 12px; min-height: 20px; }
  .offline-badge {
    display: none;
    background: #1a1a2e;
    border: 1px solid #2d2d4a;
    color: #a78bfa;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <div class="logo">VIBEPLAYR</div>
  <div class="sub">SPACE MOBILE</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="status" id="status">Opstarten...</div>
  <div class="offline-badge" id="offlineBadge">📦 Offline modus</div>

<script>
const CACHE_KEY  = 'vibeplayr_html_v1';
const CACHE_FAV  = 'vibeplayr_favicon_v1';
const REMOTE_URL  = 'https://vibeplayr.space/indexmobile';
const FAVICON_URL = 'https://vibeplayr.space/favicon.ico';

const bar    = document.getElementById('bar');
const status = document.getElementById('status');
const badge  = document.getElementById('offlineBadge');

function setProgress(pct, msg) {
  bar.style.width = pct + '%';
  status.textContent = msg;
}

function launch(html) {
  setProgress(100, 'Klaar!');
  setTimeout(() => {
    document.open();
    document.write(html);
    document.close();
  }, 300);
}

async function fetchFresh() {
  const ctrl = new AbortController();
  const timeout = setTimeout(() => ctrl.abort(), 12000);
  try {
    const res = await fetch(REMOTE_URL, { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timeout);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  } catch(e) {
    clearTimeout(timeout);
    throw e;
  }
}

async function cacheFavicon() {
  try {
    const res = await fetch(FAVICON_URL, { cache: 'no-store' });
    if (!res.ok) return;
    const blob = await res.blob();
    const reader = new FileReader();
    await new Promise(r => { reader.onload = r; reader.readAsDataURL(blob); });
    localStorage.setItem(CACHE_FAV, reader.result);
  } catch(_) {} // favicon is niet kritisch
}

async function loadOnline() {
  setProgress(20, 'Online — laatste versie ophalen...');
  const html = await fetchFresh(); // gooit een error als het mislukt

  setProgress(65, 'Opslaan voor offline gebruik...');
  localStorage.setItem(CACHE_KEY, html);
  cacheFavicon(); // fire-and-forget

  setProgress(90, 'Starten...');
  launch(html);
}

function loadOffline() {
  setProgress(30, 'Offline — cache laden...');
  const html = localStorage.getItem(CACHE_KEY);

  if (!html) {
    bar.style.background = '#ef4444';
    setProgress(100, '❌ Geen cache. Verbind met internet voor eerste gebruik.');
    return;
  }

  badge.style.display = 'block';
  setProgress(90, 'Offline modus actief');
  launch(html);
}

async function loadApp() {
  if (navigator.onLine) {
    try {
      await loadOnline();
    } catch(err) {
      // navigator.onLine zegt online maar fetch mislukt toch
      // (captive portal, slechte verbinding, etc.) — val terug op cache
      console.warn('[VIBEPLAYR] Fetch mislukt ondanks onLine=true:', err);
      loadOffline();
    }
  } else {
    loadOffline();
  }
}

loadApp();
</script>
</body>
</html>
